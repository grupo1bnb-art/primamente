{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Rpublix</title>

    <link rel="stylesheet" href="{% static 'inverso_sa/css/login.css' %}">

    <!-- ICONOS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- FUENTE -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <!-- FONDO NATURAL -->
    <div class="bg-overlay"></div>

    <!-- PANEL IZQUIERDO (IGUAL QUE REGISTRO) -->
    <div class="left">

        <div class="content">
            <h1>🌱 Energía Inteligente</h1>
            <p>Invierte en tecnología sostenible y genera ingresos automáticos.</p>

            <div class="features">
                <div><i class="bi bi-wind"></i> Energía renovable</div>
                <div><i class="bi bi-cpu"></i> IA optimizada</div>
                <div><i class="bi bi-shield-check"></i> Seguridad total</div>
            </div>
        </div>

    </div>

    <!-- LOGIN -->
    <div class="right">

        <div class="card">

            <h2>Iniciar Sesión</h2>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST" id="login-form">
                {% csrf_token %}

                <div class="input-group">
                    <i class="bi bi-person"></i>
                    <input type="text" name="username" required>
                    <label>Teléfono o usuario</label>
                </div>

                <div class="input-group">
                    <i class="bi bi-lock"></i>
                    <input type="password" name="password" required>
                    <label>Contraseña</label>
                </div>

                <button type="submit" id="submit-btn">
                    Ingresar
                </button>

                <p id="wait-msg">⏳ Validando acceso...</p>

                <p class="login-link">
                    ¿No tienes cuenta?
                    <a href="{% url 'registro' %}">Registrarse</a>
                </p>

            </form>

        </div>

    </div>

</div>

<script>
const form = document.getElementById('login-form');
const btn = document.getElementById('submit-btn');
const msg = document.getElementById('wait-msg');

form.addEventListener('submit', function () {
    btn.disabled = true;
    msg.style.display = 'block';
});
</script>

</body>
</html>
